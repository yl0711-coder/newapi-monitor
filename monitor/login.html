<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📈%3C/text%3E%3C/svg%3E">
<title>登录 · new-api 监控</title>
<script>
fetch('/api/brand').then(function(r){return r.json()}).then(function(d){
  if(!d||!d.name)return;
  document.title=document.title.replace('new-api',d.name);
  var set=function(){document.querySelectorAll('[data-brand]').forEach(function(el){el.textContent=d.name})};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',set);else set();
}).catch(function(){});
</script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3e;--accent:#6366f1;--text:#e2e8f0;--muted:#94a3b8;--red:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px 30px;width:340px}
  h1{font-size:19px;font-weight:600;margin-bottom:4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px}
  input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    padding:10px 12px;border-radius:8px;font-size:14px;outline:none}
  input:focus{border-color:var(--accent)}
  button{width:100%;margin-top:22px;background:var(--accent);color:#fff;border:none;
    padding:11px;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer}
  button:disabled{opacity:.6;cursor:default}
  #msg{margin-top:14px;font-size:13px;min-height:18px;color:var(--red)}
  .hint{margin-top:18px;font-size:12px;color:var(--muted);line-height:1.6}
</style>
</head>
<body>
<form class="card" id="f">
  <h1>📈 <span data-brand>new-api</span> 上游监控</h1>
  <div class="sub">请用主站(new-api)账号登录</div>
  <label>用户名</label>
  <input id="u" autocomplete="username" autofocus>
  <label>密码</label>
  <input id="p" type="password" autocomplete="current-password">
  <button id="btn" type="submit">登录</button>
  <div id="msg"></div>
  <div class="hint">仅超级管理员与管理员可访问。<br>超级管理员可配置报警,管理员仅查看监控。</div>
</form>
<script>
const $=id=>document.getElementById(id);
$('f').onsubmit=async e=>{
  e.preventDefault();
  const btn=$('btn'), msg=$('msg');
  msg.textContent=''; btn.disabled=true; btn.textContent='登录中…';
  try{
    const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({username:$('u').value.trim(),password:$('p').value})});
    const d=await r.json();
    if(d.ok){ location.href='/'; return; }
    msg.textContent='✗ '+(d.error||'登录失败');
  }catch(err){ msg.textContent='✗ '+err.message; }
  btn.disabled=false; btn.textContent='登录';
};
</script>
</body>
</html>
