<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服务状态</title>
<link rel="icon" id="favicon" href="data:,">

<style>
  :root{
    --bg:#f5f7fa; --card:#fff; --line:#e7ebf0; --ink:#1f2937; --muted:#6b7280; --faint:#9aa3af;
    --brand1:#2dd4bf; --brand2:#3b82f6;
    --ok:#16a34a; --ok-bg:#e9f7ef; --ok-ink:#15803d;
    --warn:#d97706; --warn-bg:#fdf4e6; --warn-ink:#b45309;
    --bad:#dc2626; --bad-bg:#fdecec; --bad-ink:#b91c1c;
    --maint:#2563eb; --maint-bg:#e8effd; --maint-ink:#1d4ed8;
    --na:#9ca3af; --na-bg:#f1f3f5; --na-ink:#6b7280;
    --beat-ok:#48c479; --beat-warn:#f0a92b; --beat-bad:#e25563; --beat-maint:#2f6bff; --beat-na:#e3e8ee;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:1080px;margin:0 auto;padding:38px 20px 60px}
  .head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .brand{display:inline-flex;align-items:center;gap:11px}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand1),var(--brand2));display:grid;place-items:center;color:#fff;font-size:18px;font-weight:800}
  .brand .t1{font-size:20px;font-weight:750;line-height:1.1}
  .brand .t2{font-size:12px;color:var(--muted)}
  .headright{display:flex;align-items:center;gap:12px}
  .langtog{display:inline-flex;background:#eef1f5;border-radius:9px;padding:2px}
  .langtog button{border:0;background:transparent;color:var(--muted);font-size:12px;font-weight:600;padding:4px 9px;border-radius:7px;cursor:pointer}
  .langtog button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .updated{font-size:12px;color:var(--faint);text-align:right}
  .updated b{color:var(--muted);font-weight:600}
  .banner{display:flex;align-items:center;gap:13px;border-radius:14px;padding:15px 20px;box-shadow:var(--shadow);font-weight:650;font-size:17px;margin-bottom:14px}
  .banner.ok{background:var(--ok-bg);color:var(--ok-ink)} .banner.warn{background:var(--warn-bg);color:var(--warn-ink)}
  .banner.bad{background:var(--bad-bg);color:var(--bad-ink)} .banner.maint{background:var(--maint-bg);color:var(--maint-ink)}
  .banner .ic{width:22px;height:22px;flex:none}
  .events{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .event{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--warn);border-radius:10px;padding:9px 13px;font-size:13px;box-shadow:var(--shadow)}
  .event.bad{border-left-color:var(--bad)} .event.warn{border-left-color:var(--warn)} .event.maint{border-left-color:var(--maint)}
  .event .etag{font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px}
  .event.bad .etag{background:var(--bad-bg);color:var(--bad-ink)} .event.warn .etag{background:var(--warn-bg);color:var(--warn-ink)} .event.maint .etag{background:var(--maint-bg);color:var(--maint-ink)}
  .summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .stat{flex:1;min-width:120px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
  .stat .k{font-size:11.5px;color:var(--muted)} .stat .v{font-size:22px;font-weight:750;font-variant-numeric:tabular-nums;margin-top:2px}
  .stat .v small{font-size:13px;font-weight:600;color:var(--muted)}
  .stat.ok .v{color:var(--ok-ink)} .stat.warn .v{color:var(--warn-ink)} .stat.bad .v{color:var(--bad-ink)}
  .tools{margin-bottom:20px}
  .search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 13px;box-shadow:var(--shadow)}
  .search input{border:0;outline:0;width:100%;font-size:14px;background:transparent;color:var(--ink)}
  .search svg{width:16px;height:16px;color:var(--faint);flex:none}
  .gcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .1s,box-shadow .1s;display:flex;flex-direction:column;gap:11px}
  .gcard:hover{transform:translateY(-2px);box-shadow:0 7px 20px rgba(16,24,40,.1)}
  .gcard.bad{border-color:#f3c9cd} .gcard.warn{border-color:#f3e2c0}
  .gcard-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .gtitle{font-size:16px;font-weight:700;word-break:break-all}
  .rec-label{font-size:11px;color:var(--faint);margin-bottom:4px}
  .rec-model{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
  .rec-up{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--ok-ink);font-weight:700}
  .gcard-foot{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);padding-top:2px;border-top:1px solid var(--line)}
  .gcard-foot .arrow{color:var(--brand2);font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px 13px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:11px}
  .card.bad{border-color:#f3c9cd} .card.warn{border-color:#f3e2c0}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .pvbadge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
  .pv-anthropic{background:#faf0ec;color:#b5491f} .pv-openai{background:#e9f5f1;color:#0a7a5c}
  .pv-google{background:#eaf1fd;color:#1a62d6} .pv-deepseek{background:#eef0ff;color:#4f46e5} .pv-other{background:#f1f3f5;color:#5b6472}
  .mname{font-size:15.5px;font-weight:650;word-break:break-all;margin-top:5px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .pill .dot{width:7px;height:7px;border-radius:50%}
  .pill.ok{background:var(--ok-bg);color:var(--ok-ink)} .pill.ok .dot{background:var(--ok)}
  .pill.warn{background:var(--warn-bg);color:var(--warn-ink)} .pill.warn .dot{background:var(--warn)}
  .pill.bad{background:var(--bad-bg);color:var(--bad-ink)} .pill.bad .dot{background:var(--bad)}
  .pill.maint{background:var(--maint-bg);color:var(--maint-ink)} .pill.maint .dot{background:var(--maint)}
  .pill.na{background:var(--na-bg);color:var(--na-ink)} .pill.na .dot{background:var(--na)}
  .pill.sm{font-size:11.5px;padding:3px 9px}
  .metrics{display:flex;gap:22px}
  .metric .k{font-size:11px;color:var(--muted);margin-bottom:1px}
  .metric .v{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums} .metric .v.muted{color:var(--faint)}
  .hbwrap{padding-top:2px}
  .hbbar{display:flex;gap:2px;align-items:center;height:22px;overflow:visible}
  .beat{width:5px;height:16px;border-radius:2.5px;flex:none;cursor:default;transition:transform .08s ease;transform-origin:center}
  .beat:hover{transform:scale(1.5);opacity:.85}
  .beat.ok{background:var(--beat-ok)} .beat.warn{background:var(--beat-warn)} .beat.bad{background:var(--beat-bad)} .beat.maint{background:var(--beat-maint)} .beat.na{background:var(--beat-na)}
  .hbcap{display:flex;justify-content:space-between;font-size:10.5px;color:var(--faint);margin-top:5px}
  .sgroup{margin-bottom:18px}
  .sgroup-h{font-size:14px;font-weight:700;margin:0 2px 9px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sgroup-h .cnt{color:var(--faint);font-weight:500;font-size:12.5px}
  .srow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin-bottom:7px;box-shadow:var(--shadow)}
  .srow.best{border-color:#bbe7cb;background:#f4fcf7}
  .srow .sline{font-weight:650;font-size:13.5px;word-break:break-all}
  .srow .tag{font-size:10.5px;font-weight:700;color:var(--ok-ink);background:var(--ok-bg);padding:1px 7px;border-radius:999px}
  .srow .sm{margin-left:auto;display:flex;gap:16px;align-items:center;font-size:12.5px;color:var(--muted)}
  .msg{text-align:center;color:var(--faint);font-size:13px;padding:40px 0}
  .modal-bg{position:fixed;inset:0;background:rgba(17,24,39,.45);display:none;z-index:40;overflow:auto;padding:20px}
  .modal-bg.on{display:block}
  .modal{max-width:1000px;margin:24px auto;background:var(--bg);border-radius:16px;padding:20px 20px 24px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .modal-head .mt{font-size:18px;font-weight:750;word-break:break-all}
  .xbtn{border:1px solid var(--line);background:#fff;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:19px;line-height:1;color:var(--muted);flex:none}
  .modal-sub{font-size:12px;color:var(--faint);margin-bottom:14px}
  .legend{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-top:32px;font-size:12.5px;color:var(--muted)}
  .legend .li{display:inline-flex;align-items:center;gap:6px} .legend .sw{width:10px;height:10px;border-radius:3px}
  .rule{max-width:820px;margin:13px auto 0;font-size:11.5px;color:var(--faint);text-align:center;line-height:1.7}
  .foot{text-align:center;margin-top:14px;font-size:12px;color:var(--faint)}
  @media(max-width:560px){ .wrap{padding:26px 14px 44px} .gcards,.grid{grid-template-columns:1fr} .metrics{gap:18px} .summary .stat{min-width:calc(50% - 5px)} .srow .sm{margin-left:0;width:100%} }
  #tip{position:fixed;z-index:60;pointer-events:none;background:#1f2937;color:#fff;font-size:11.5px;padding:5px 9px;border-radius:7px;white-space:nowrap;opacity:0;transform:translate(-50%,-130%);transition:opacity .1s}
  #tip b{font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="brand"><span class="logo" id="logo"></span>
      <div><div class="t1" id="title"></div><div class="t2" id="subtitle"></div></div></div>
    <div class="headright">
      <div class="langtog" id="langtog"><button data-l="zh">中</button><button data-l="en">EN</button></div>
      <div class="updated"><span id="updLabel"></span> <b id="upd">--:--:--</b><br><span id="cd"></span></div>
    </div>
  </div>
  <div id="banner" class="banner ok"></div>
  <div id="events" class="events"></div>
  <div id="summary" class="summary"></div>
  <div class="tools">
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" autocomplete="off"></div>
  </div>
  <div id="groups"></div>
  <div class="legend" id="legend"></div>
  <div class="rule" id="rule"></div>
  <div class="foot" id="foot"></div>
</div>

<div id="modal" class="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head"><div><span class="mt" id="mTitle"></span></div>
      <button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="modal-sub" id="mSub"></div>
    <div class="grid" id="mBody"></div>
  </div>
</div>
<div id="tip"></div>

<script>
/* ===== 国际化 ===== */
const I18N = {
  zh: {
    title_suffix:"服务状态", subtitle:"上游模型实时可用性",
    updated:"最近更新", autorefresh:"自动刷新", refresh_in:"{n} 秒后自动刷新",
    st_ok:"正常", st_warn:"性能下降", st_bad:"不可用", st_maint:"维护中", st_na:"数据不足",
    banner_ok:"所有服务运行正常", banner_warn:"部分服务性能下降", banner_bad:"部分服务当前不可用", banner_maint:"部分服务维护中",
    sum_uptime:"整体可用率 · 近7天", sum_lines:"线路", sum_warn:"性能下降", sum_bad:"不可用",
    search_ph:"搜索模型,跨线路对比稳定性(如 gpt-5.5 / claude-opus)…",
    rec_label:"推荐 · 最稳定模型", n_models:"{n} 个模型", view_all:"查看全部 →",
    m_avail:"可用性 · 近7天", m_latency:"响应延迟", cap_ago:"7 天前", cap_now:"现在",
    on_n_lines:"· 在 {n} 条线路提供", best:"最稳",
    no_match:"没有匹配「{q}」的模型", no_data:"暂无数据", err:"暂时无法获取服务状态,请稍后刷新",
    modal_sub:"线路 = 创建令牌时所选分组「{name}」· 共 {n} 个模型",
    leg_ok:"正常", leg_warn:"性能下降", leg_bad:"不可用", leg_maint:"维护中", leg_na:"数据不足",
    rule:"线路 = 创建令牌时所选「分组」;同一模型在不同线路可能状态不同,可搜索对比后自行选择。状态反映「当下」可用性(近期流量 + 是否有可用上游):正常 · 性能下降(近期可用率 85–99%)· 不可用(近期可用率 <85% 或无可用上游)。可用率 = 成功请求 /(总请求 − 用户侧错误),为近 7 天统计;数据过旧时显「—」。",
    foot:"由 NexusAPI 提供",
  },
  en: {
    title_suffix:"Service Status", subtitle:"Real-time upstream model availability",
    updated:"Last updated", autorefresh:"Auto-refresh", refresh_in:"Refreshing in {n}s",
    st_ok:"Operational", st_warn:"Degraded", st_bad:"Outage", st_maint:"Maintenance", st_na:"No data",
    banner_ok:"All systems operational", banner_warn:"Partial performance degradation", banner_bad:"Partial service outage", banner_maint:"Maintenance in progress",
    sum_uptime:"Overall uptime · 7d", sum_lines:"Lines", sum_warn:"Degraded", sum_bad:"Outage",
    search_ph:"Search a model to compare stability across lines (e.g. gpt-5.5 / claude-opus)…",
    rec_label:"Recommended · most stable", n_models:"{n} models", view_all:"View all →",
    m_avail:"Uptime · 7d", m_latency:"Latency", cap_ago:"7 days ago", cap_now:"now",
    on_n_lines:"· on {n} lines", best:"Best",
    no_match:'No models matching "{q}"', no_data:"No data yet", err:"Service status temporarily unavailable, please refresh later.",
    modal_sub:'Line = the group selected when creating a token ("{name}") · {n} models',
    leg_ok:"Operational", leg_warn:"Degraded", leg_bad:"Outage", leg_maint:"Maintenance", leg_na:"No data",
    rule:"A line = the group selected when creating a token; the same model may differ across lines — search to compare and choose. Status reflects current availability (recent traffic + whether any usable upstream exists): Operational · Degraded (recent uptime 85–99%) · Outage (recent uptime <85% or no usable upstream). Uptime = successful / (total − user-side errors), over the last 7 days; shown as \"—\" when data is stale.",
    foot:"Powered by NexusAPI",
  },
};
let lang = localStorage.getItem("lang") || ((navigator.language||"").toLowerCase().startsWith("zh") ? "zh" : "en");
function t(k){ return (I18N[lang] && I18N[lang][k] != null) ? I18N[lang][k] : (I18N.zh[k] != null ? I18N.zh[k] : k); }
function fmt(k, vars){ return t(k).replace(/\{(\w+)\}/g, (_,n)=> (vars && vars[n]!=null) ? vars[n] : "{"+n+"}"); }

/* ===== 状态/常量 ===== */
const STC = { 1:"ok", 2:"warn", 0:"bad", 3:"maint", "-1":"na" };       // 状态码 → CSS 类(与语言无关)
const stClass = s => STC[s] || "na";
const stLabel = s => t("st_"+stClass(s));
const SEV = { 0:4, 2:3, "-1":2, 3:1, 1:0 };
const ICON = {
  ok:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  warn:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>',
  bad:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15 9-6 6M9 9l6 6"/></svg>',
  maint:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.3L4 17l3 3 5.4-5.3a4 4 0 0 0 5.3-5.4l-2.6 2.6-2-2 2.6-2.6Z"/></svg>',
};
const PVN = { anthropic:"Anthropic", openai:"OpenAI", google:"Google", deepseek:"DeepSeek", other:"" };
const WIN_DAYS = 7, PER = 7;
const state = { snap:null, q:"", site:"", logo:"" };

const worst = arr => arr.reduce((w,s)=> SEV[s]>SEV[w]?s:w, 1);
function clock(){ const n=new Date(); return [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,"0")).join(":"); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function beatTime(i,n){ const slice=WIN_DAYS*86400000/n; const d=new Date(Date.now()-WIN_DAYS*86400000+i*slice);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:00`; }
function upStr(m){ return m.uptime==null?"—":(m.uptime*100).toFixed(2)+"%"; }
function latStr(m){ return m.latency_ms==null?"—":(m.latency_ms/1000).toFixed(1)+"s"; }
function pvLabel(p){ return PVN[p] || (lang==="zh"?"其他":"Other"); }

function fitBeats(beats,width){
  const max=Math.max(8,Math.floor((width+2)/PER)); const n=Math.min(max,beats.length||1);
  if(!beats.length) return [];
  const step=beats.length/n,out=[];
  for(let i=0;i<n;i++){ let st=1; for(let j=Math.floor(i*step);j<Math.floor((i+1)*step);j++) if(SEV[beats[j]]>SEV[st])st=beats[j]; out.push(st); }
  return out;
}
function paintBars(){
  document.querySelectorAll(".hbbar").forEach(bar=>{
    const beats=JSON.parse(bar.dataset.beats||"[]"); const bs=fitBeats(beats,bar.clientWidth||280);
    bar.innerHTML=bs.map((s,i)=>`<span class="beat ${stClass(s)}" data-i="${i}" data-n="${bs.length}" data-s="${s}"></span>`).join("");
  });
}
function recommend(models){
  const ops=models.filter(m=>m.status===1);
  const rated=ops.filter(m=>m.uptime!=null).sort((a,b)=>b.uptime-a.uptime);
  if(rated.length) return rated[0];
  if(ops.length) return ops[0];
  return models.slice().sort((a,b)=>SEV[a.status]-SEV[b.status])[0];
}
function modelCard(m){
  return `<div class="card ${stClass(m.status)}">
    <div class="card-top"><div><span class="pvbadge pv-${m.provider}">${pvLabel(m.provider)}</span><div class="mname">${esc(m.name)}</div></div>
      <span class="pill ${stClass(m.status)}"><span class="dot"></span>${stLabel(m.status)}</span></div>
    <div class="metrics">
      <div class="metric"><div class="k">${t("m_avail")}</div><div class="v ${m.uptime==null?"muted":""}">${upStr(m)}</div></div>
      <div class="metric"><div class="k">${t("m_latency")}</div><div class="v ${m.latency_ms==null?"muted":""}">${latStr(m)}</div></div></div>
    <div class="hbwrap"><div class="hbbar" data-beats='${JSON.stringify(m.beats||[])}'></div>
      <div class="hbcap"><span>${t("cap_ago")}</span><span>${t("cap_now")}</span></div></div>
  </div>`;
}

function applyStatic(){
  document.documentElement.lang = lang==="zh" ? "zh-CN" : "en";
  // 标题/品牌 = 主站同步来的站点名 + 本地化后缀;站点名为空则只显通用后缀(不硬编码品牌)
  const fullTitle = (state.site ? state.site+" " : "") + t("title_suffix");
  document.title = fullTitle;
  document.getElementById("title").textContent = fullTitle;
  document.getElementById("logo").textContent = state.site ? state.site.trim().charAt(0).toUpperCase() : "·";
  if(state.logo) document.getElementById("favicon").href = state.logo;
  document.getElementById("subtitle").textContent = t("subtitle");
  document.getElementById("updLabel").textContent = t("updated");
  document.getElementById("q").placeholder = t("search_ph");
  document.getElementById("rule").textContent = t("rule");
  document.getElementById("foot").textContent = t("foot");
  document.getElementById("legend").innerHTML =
    [["ok","leg_ok"],["warn","leg_warn"],["bad","leg_bad"],["maint","leg_maint"],["na","leg_na"]]
    .map(([c,k])=>`<span class="li"><span class="sw" style="background:var(--beat-${c})"></span>${t(k)}</span>`).join("");
  [...document.getElementById("langtog").children].forEach(b=>b.classList.toggle("on",b.dataset.l===lang));
}

function renderTop(){
  const snap=state.snap, all=snap.groups.flatMap(g=>g.models), ov=snap.overall;
  const bk={1:"banner_ok",2:"banner_warn",0:"banner_bad",3:"banner_maint"};
  const b=document.getElementById("banner"); b.className="banner "+stClass(ov);
  b.innerHTML=`${ICON[stClass(ov)]||""}<span>${t(bk[ov]||"banner_ok")}</span>`;

  const evs=[];
  snap.groups.forEach(g=>g.models.forEach(m=>{ if(m.status===0||m.status===2||m.status===3) evs.push({line:g.name,model:m.name,status:m.status}); }));
  evs.sort((a,b)=>SEV[b.status]-SEV[a.status]);
  document.getElementById("events").innerHTML=evs.slice(0,8).map(e=>`
    <div class="event ${stClass(e.status)}"><span class="etag">${stLabel(e.status)}</span>
      <span><b>${esc(e.line)}</b> · ${esc(e.model)}</span></div>`).join("");

  const cnt={ok:0,warn:0,bad:0}; all.forEach(m=>{ const c=stClass(m.status); if(c==="ok"||c==="maint"||c==="na")cnt.ok++; else cnt[c]++; });
  const rated=all.filter(m=>m.uptime!=null); const avg=rated.length?rated.reduce((s,m)=>s+m.uptime,0)/rated.length:1;
  document.getElementById("summary").innerHTML=`
    <div class="stat"><div class="k">${t("sum_uptime")}</div><div class="v">${(avg*100).toFixed(2)}<small>%</small></div></div>
    <div class="stat"><div class="k">${t("sum_lines")}</div><div class="v">${snap.groups.length}</div></div>
    <div class="stat warn"><div class="k">${t("sum_warn")}</div><div class="v">${cnt.warn}</div></div>
    <div class="stat bad"><div class="k">${t("sum_bad")}</div><div class="v">${cnt.bad}</div></div>`;
}

function renderGroups(host){
  host.innerHTML=`<div class="gcards">`+state.snap.groups.map((g,gi)=>{
    const gs=worst(g.models.map(m=>m.status));
    const rec=recommend(g.models);
    const recUp = rec.uptime==null ? stLabel(rec.status) : (rec.uptime*100).toFixed(2)+"%";
    return `<div class="gcard ${stClass(gs)}" onclick="openModal(${gi})">
      <div class="gcard-top"><span class="gtitle">${esc(g.name)}</span>
        <span class="pill sm ${stClass(gs)}"><span class="dot"></span>${stLabel(gs)}</span></div>
      <div>
        <div class="rec-label">${t("rec_label")}</div>
        <div class="rec-model"><span class="pvbadge pv-${rec.provider}">${pvLabel(rec.provider)}</span>
          <span style="word-break:break-all">${esc(rec.name)}</span><span class="rec-up">${recUp}</span></div>
      </div>
      <div class="hbbar" data-beats='${JSON.stringify(rec.beats||[])}'></div>
      <div class="gcard-foot"><span>${fmt("n_models",{n:g.models.length})}</span><span class="arrow">${t("view_all")}</span></div>
    </div>`;
  }).join("")+`</div>`;
  paintBars();
}

function renderSearch(host,q){
  const byModel={};
  state.snap.groups.forEach(g=>g.models.forEach(m=>{
    if(m.name.toLowerCase().includes(q)){
      (byModel[m.name]=byModel[m.name]||{provider:m.provider,rows:[]}).rows.push({line:g.name,status:m.status,uptime:m.uptime,latency_ms:m.latency_ms});
    }
  }));
  const names=Object.keys(byModel).sort();
  if(!names.length){ host.innerHTML=`<div class="msg">${fmt("no_match",{q:esc(q)})}</div>`; return; }
  host.innerHTML=names.map(n=>{
    const info=byModel[n];
    const rows=info.rows.slice().sort((a,b)=>{ if(SEV[a.status]!==SEV[b.status])return SEV[a.status]-SEV[b.status]; return (b.uptime||0)-(a.uptime||0); });
    return `<div class="sgroup">
      <div class="sgroup-h"><span class="pvbadge pv-${info.provider}">${pvLabel(info.provider)}</span>${esc(n)}<span class="cnt">${fmt("on_n_lines",{n:rows.length})}</span></div>
      ${rows.map((r,i)=>`<div class="srow ${i===0&&r.status===1?"best":""}">
        <span class="sline">${esc(r.line)}</span>${i===0&&r.status===1?`<span class="tag">${t("best")}</span>`:""}
        <span class="sm">
          <span class="pill sm ${stClass(r.status)}"><span class="dot"></span>${stLabel(r.status)}</span>
          <span>${t("m_avail").split("·")[0].trim()} ${r.uptime==null?"—":(r.uptime*100).toFixed(2)+"%"}</span>
          <span>${t("m_latency")} ${r.latency_ms==null?"—":(r.latency_ms/1000).toFixed(1)+"s"}</span>
        </span></div>`).join("")}
    </div>`;
  }).join("");
}

function render(){
  if(!state.snap) return;
  renderTop();
  const host=document.getElementById("groups");
  const q=state.q.trim().toLowerCase();
  if(q) renderSearch(host,q); else renderGroups(host);
}

function openModal(gi){
  const g=state.snap.groups[gi]; if(!g)return;
  const gs=worst(g.models.map(m=>m.status));
  document.getElementById("mTitle").innerHTML=`${esc(g.name)} <span class="pill sm ${stClass(gs)}" style="vertical-align:middle"><span class="dot"></span>${stLabel(gs)}</span>`;
  document.getElementById("mSub").textContent=fmt("modal_sub",{name:g.name,n:g.models.length});
  document.getElementById("mBody").innerHTML=g.models.map(modelCard).join("");
  document.getElementById("modal").classList.add("on");
  document.body.style.overflow="hidden";
  paintBars();
}
function closeModal(e){
  if(e && e.target && e.target.id!=="modal" && !e.target.classList.contains("xbtn")) return;
  document.getElementById("modal").classList.remove("on");
  document.body.style.overflow="";
}
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

function setLang(l){ lang=l; localStorage.setItem("lang",l); applyStatic(); render(); }
document.getElementById("langtog").addEventListener("click",e=>{ const b=e.target.closest("button"); if(b) setLang(b.dataset.l); });

async function load(){
  try{
    const r=await fetch("/public/status",{cache:"no-store"}); if(!r.ok) throw 0;
    state.snap=await r.json();
    if(state.snap.site!==state.site || state.snap.logo!==state.logo){
      state.site=state.snap.site||""; state.logo=state.snap.logo||""; applyStatic(); // 站点名/logo 来自主站同步
    }
    render();
    document.getElementById("upd").textContent=clock();
  }catch(e){
    if(!state.snap) document.getElementById("groups").innerHTML=`<div class="msg">${t("err")}</div>`;
  }
}
document.getElementById("q").addEventListener("input",e=>{ state.q=e.target.value; render(); });
const tip=document.getElementById("tip");
document.addEventListener("mousemove",e=>{ const el=e.target.closest(".beat");
  if(!el){ tip.style.opacity=0; return; }
  tip.innerHTML=`<b>${beatTime(+el.dataset.i,+el.dataset.n)}</b> · ${stLabel(+el.dataset.s)}`;
  tip.style.left=e.clientX+"px"; tip.style.top=e.clientY+"px"; tip.style.opacity=1; });
let rz; addEventListener("resize",()=>{ clearTimeout(rz); rz=setTimeout(paintBars,120); });

applyStatic();
load();
let left=60;
setInterval(()=>{ left--; if(left<=0){ left=60; load(); } document.getElementById("cd").textContent=fmt("refresh_in",{n:left}); },1000);
</script>
</body>
</html>
